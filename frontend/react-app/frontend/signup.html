<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base-url" content="http://localhost:5000/api" />
    <title>StudyHub Lite | Signup</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="signup">
    <header class="nav-wrap">
      <nav class="navbar">
        <a href="./index.html" class="brand">StudyHub Lite</a>
        <div class="nav-links">
          <a href="./index.html" data-nav="home">Home</a>
          <a href="./login.html" data-auth="guest">Login</a>
          <a href="./signup.html" data-auth="guest">Signup</a>
          <a href="./dashboard.html" data-nav="dashboard">Dashboard</a>
          <button type="button" class="ghost-btn" id="logoutBtn" data-auth="user">Logout</button>
        </div>
      </nav>
    </header>

    <main class="auth-page">
      <form class="auth-card" id="signupForm" novalidate>
        <h2>Signup</h2>

        <label for="username">Username</label>
        <input id="username" type="text" name="username" autocomplete="name" required />

        <label for="email">Email</label>
        <input id="email" type="email" name="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="new-password" required minlength="6" />

        <p class="error-msg" id="signupError" hidden></p>
        <p class="success-msg" id="signupSuccess" hidden></p>

        <button type="submit" class="primary-btn" id="signupSubmitBtn">Signup</button>
        <p>Already registered? <a href="./login.html">Login</a></p>
      </form>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
